<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relevamiento Técnico PWA</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <header>
        <h1>Relevamiento Técnico</h1>
        <p>Captura de datos mediante OCR y geolocalización</p>
    </header>

    <main>

        <section id="seccion-camara">
            <h2>Captura de imagen</h2>

            <button id="btn-iniciar-camara">
                Abrir cámara
            </button>

            <video id="camara" autoplay></video>

            <button id="btn-capturar" disabled>
                Capturar imagen
            </button>

            <canvas id="imagen-capturada"></canvas>

            <button id="btn-ocr" disabled>
                Extraer texto
            </button>
        </section>


        <!-- Sección de OCR -->
        <section id="seccion-ocr">
            <h2>Texto reconocido</h2>

            <textarea 
                id="texto-ocr"
                placeholder="El texto extraído aparecerá aquí..."
                readonly></textarea>

            <button id="btn-copiar">
                Copiar texto
            </button>
        </section>


        <!-- Sección de ubicación -->
        <section id="seccion-ubicacion">

            <h2>Ubicación del relevamiento</h2>

            <div id="mapa">
                Obteniendo ubicación...
            </div>

        </section>

    </main>


    <script src="js/app.js"></script>
    <script src="js/camara.js"></script>
    <script src="js/ocr.js"></script>
    <script src="js/ubicacion.js"></script>
    <script src="js/copiar.js"></script>

</body>
</html>
